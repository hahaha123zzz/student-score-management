<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩管理系统 - 管理后台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <h2>成绩管理系统 - 管理后台</h2>
        <div class="header-right">
            <span id="userInfo"></span>
            <button onclick="changePassword()">修改密码</button>
            <button onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('students')">学生管理</div>
        <div class="tab" onclick="switchTab('classes')">班级管理</div>
        <div class="tab" onclick="switchTab('exams')">考试管理</div>
        <div class="tab" onclick="switchTab('grades')">成绩管理</div>
        <div class="tab" onclick="switchTab('stats')">统计分析</div>
        <div class="tab" onclick="switchTab('logs')">操作日志</div>
    </div>

    <div class="content">
        <!-- ====== 学生管理 ====== -->
        <div id="tab-students" class="tab-content active">
            <div class="toolbar">
                <div>
                    <input type="text" id="stuSearch" placeholder="搜索姓名..." onkeyup="if(event.key==='Enter')loadStudents()">
                    <button onclick="loadStudents()">搜索</button>
                </div>
                <button class="btn-success" onclick="showStudentModal()">添加学生</button>
            </div>
            <div id="studentsTable"></div>
            <div class="pagination" id="studentsPager"></div>
        </div>

        <!-- ====== 班级管理 ====== -->
        <div id="tab-classes" class="tab-content">
            <div class="toolbar">
                <h3>班级列表</h3>
                <button class="btn-success" onclick="showClassModal()">添加班级</button>
            </div>
            <div id="classesTable"></div>
        </div>

        <!-- ====== 考试管理 ====== -->
        <div id="tab-exams" class="tab-content">
            <div class="toolbar">
                <h3>考试列表</h3>
                <button class="btn-success" onclick="showExamModal()">添加考试</button>
            </div>
            <div id="examsTable"></div>
        </div>

        <!-- ====== 成绩管理 ====== -->
        <div id="tab-grades" class="tab-content">
            <div class="toolbar">
                <div>
                    <select id="gradeExam" onchange="loadGrades()">
                        <option value="">选择考试</option>
                    </select>
                    <button onclick="loadGrades()">查询</button>
                </div>
                <div>
                    <button class="btn-success" onclick="showGradeModal()">录入成绩</button>
                    <button onclick="showImportModal()">CSV导入</button>
                    <button onclick="exportCSV()">CSV导出</button>
                </div>
            </div>
            <div id="gradesTable"></div>
        </div>

        <!-- ====== 统计分析 ====== -->
        <div id="tab-stats" class="tab-content">
            <div class="toolbar">
                <div>
                    <select id="statsExam" onchange="loadStats()">
                        <option value="">选择考试</option>
                    </select>
                    <button onclick="loadStats()">查询</button>
                </div>
            </div>
            <div class="stats-cards" id="statsSummary"></div>
            <h3 style="margin:20px 0 12px;">排名 TOP 10</h3>
            <div id="rankTable"></div>
            <h3 style="margin:20px 0 12px;">班级对比</h3>
            <div id="classCompareTable"></div>
        </div>

        <!-- ====== 操作日志 ====== -->
        <div id="tab-logs" class="tab-content">
            <div class="toolbar">
                <h3>操作日志</h3>
                <button onclick="loadLogs()">刷新</button>
            </div>
            <div id="logsTable"></div>
            <div class="pagination" id="logsPager"></div>
        </div>
    </div>

    <!-- ====== 学生弹窗 ====== -->
    <div class="modal" id="studentModal">
        <div class="modal-content">
            <h3 id="studentModalTitle">添加学生</h3>
            <form id="studentForm">
                <input type="hidden" id="stuEditId">
                <div class="form-group">
                    <label>学号</label>
                    <input type="text" id="stuId" required>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="stuName" required>
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="stuGender">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>班级</label>
                    <select id="stuClass"></select>
                </div>
                <div class="form-group">
                    <label>生日</label>
                    <input type="text" id="stuBirthday" placeholder="YYYY-MM-DD">
                </div>
                <div class="modal-buttons">
                    <button type="button" onclick="closeModal('studentModal')">取消</button>
                    <button type="submit" class="btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ====== 成绩弹窗 ====== -->
    <div class="modal" id="gradeModal">
        <div class="modal-content">
            <h3>录入成绩</h3>
            <form id="gradeForm">
                <div class="form-group">
                    <label>考试</label>
                    <select id="gExam" onchange="loadGradeSubjects()"></select>
                </div>
                <div class="form-group">
                    <label>学生</label>
                    <select id="gStudent"></select>
                </div>
                <div id="gScores"></div>
                <div class="modal-buttons">
                    <button type="button" onclick="closeModal('gradeModal')">取消</button>
                    <button type="submit" class="btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ====== CSV导入弹窗 ====== -->
    <div class="modal" id="importModal">
        <div class="modal-content">
            <h3>CSV导入</h3>
            <div class="form-group">
                <label>考试</label>
                <select id="importExam"></select>
            </div>
            <div class="form-group">
                <label>CSV内容（第一行为科目名，第一列为学号）</label>
                <textarea id="importCSV" rows="8" style="width:100%;font-family:monospace;font-size:12px;"></textarea>
            </div>
            <div class="modal-buttons">
                <button type="button" onclick="closeModal('importModal')">取消</button>
                <button class="btn-primary" onclick="doImport()">导入</button>
            </div>
        </div>
    </div>

    <script>
        // ====== 通用工具 ======
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = 'login.html'; }

        function api(method, url, body) {
            var opt = {
                method: method,
                headers: { 'Authorization': 'Bearer ' + token }
            };
            if (body) {
                opt.headers['Content-Type'] = 'application/json';
                opt.body = JSON.stringify(body);
            }
            return fetch(url, opt).then(function(r) { return r.json(); });
        }

        // ====== 初始化 ======
        function init() {
            api('GET', '/api/auth/check').then(function(d) {
                if (!d.success) { logout(); return; }
                document.getElementById('userInfo').textContent = d.data.name + ' (' + d.data.role + ')';
            });
            loadStudents();
            loadExamSelects();
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function changePassword() {
            var oldPwd = prompt('请输入旧密码：');
            if (!oldPwd) return;
            var newPwd = prompt('请输入新密码（至少4位）：');
            if (!newPwd || newPwd.length < 4) { alert('密码至少4位'); return; }
            api('POST', '/api/change-password', { old_password: oldPwd, new_password: newPwd }).then(function(d) {
                alert(d.message);
            });
        }

        function switchTab(name) {
            document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
            document.querySelectorAll('.tab').forEach(function(el) { el.classList.remove('active'); });
            document.getElementById('tab-' + name).classList.add('active');
            event.target.classList.add('active');
            if (name === 'students') loadStudents();
            if (name === 'classes') loadClasses();
            if (name === 'exams') loadExams();
            if (name === 'grades') loadGrades();
            if (name === 'stats') loadStats();
            if (name === 'logs') loadLogs();
        }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function buildTable(headers, rows, actions) {
            var html = '<table><thead><tr>';
            headers.forEach(function(h) { html += '<th>' + h + '</th>'; });
            if (actions) html += '<th>操作</th>';
            html += '</tr></thead><tbody>';
            if (rows.length === 0) {
                html += '<tr><td colspan="' + (headers.length + (actions?1:0)) + '" style="text-align:center;color:#999;">暂无数据</td></tr>';
            } else {
                rows.forEach(function(row) {
                    html += '<tr>';
                    headers.forEach(function(h) {
                        html += '<td>' + (row[h] !== undefined ? row[h] : '') + '</td>';
                    });
                    if (actions) {
                        html += '<td>' + actions.map(function(a) {
                            return '<button style="margin-right:4px;font-size:12px;padding:4px 8px;" ' +
                                   'onclick="' + a.onclick.replace(/\{id\}/g, row.id || '') + '">' + a.label + '</button>';
                        }).join('') + '</td>';
                    }
                    html += '</tr>';
                });
            }
            html += '</tbody></table>';
            return html;
        }

        function showMessage(msg, ok) {
            alert(msg);
        }

        // ====== 加载考试下拉框 ======
        function loadExamSelects() {
            api('GET', '/api/exams').then(function(d) {
                if (!d.success) return;
                var opts = '<option value="">选择考试</option>';
                d.data.forEach(function(e) {
                    opts += '<option value="' + e.id + '">' + e.name + '</option>';
                });
                document.getElementById('gradeExam').innerHTML = opts;
                document.getElementById('statsExam').innerHTML = opts;
                document.getElementById('gExam').innerHTML = opts;
                document.getElementById('importExam').innerHTML = opts;
            });
        }

        function loadGradeSubjects() {
            var examId = document.getElementById('gExam').value;
            if (!examId) return;
            api('GET', '/api/exams').then(function(d) {
                var exam = d.data.find(function(e) { return e.id === examId; });
                if (!exam) return;
                var html = '';
                exam.subjects.forEach(function(s) {
                    html += '<div class="form-group"><label>' + s + '</label>' +
                            '<input type="number" step="0.5" class="gscore" data-subject="' + s + '" placeholder="分数"></div>';
                });
                document.getElementById('gScores').innerHTML = html;
            });
        }

        // ====== 学生管理 ======
        var stuPage = 1;
        function loadStudents() {
            api('GET', '/api/students?page=' + stuPage + '&search=' + document.getElementById('stuSearch').value).then(function(d) {
                if (!d.success) return;
                var rows = d.data.map(function(s) {
                    return { id: s.id, 学号: s.id, 姓名: s.name, 性别: s.gender, 班级: s.class, 生日: s.birthday };
                });
                document.getElementById('studentsTable').innerHTML = buildTable(
                    ['学号','姓名','性别','班级','生日'], rows,
                    [
                        { label:'编辑', onclick:'editStudent("{id}")' },
                        { label:'删除', onclick:'deleteStudent("{id}")' }
                    ]
                );
            });
        }

        function showStudentModal(s) {
            document.getElementById('studentModal').classList.add('show');
            // 加载班级选项
            api('GET', '/api/classes').then(function(d) {
                var opts = '';
                d.data.forEach(function(c) { opts += '<option value="' + c.name + '">' + c.name + '</option>'; });
                document.getElementById('stuClass').innerHTML = opts;
            });
            if (s) {
                document.getElementById('studentModalTitle').textContent = '编辑学生';
                document.getElementById('stuEditId').value = s.id;
                document.getElementById('stuId').value = s.id;
                document.getElementById('stuName').value = s.姓名;
                document.getElementById('stuGender').value = s.性别;
                document.getElementById('stuBirthday').value = s.生日;
            } else {
                document.getElementById('studentModalTitle').textContent = '添加学生';
                document.getElementById('studentForm').reset();
                document.getElementById('stuEditId').value = '';
            }
        }

        function editStudent(id) {
            api('GET', '/api/students?search=' + id).then(function(d) {
                if (!d.success || !d.data[0]) return;
                var s = d.data[0];
                showStudentModal({ id: s.id, 姓名: s.name, 性别: s.gender, 班级: s.class, 生日: s.birthday });
            });
        }

        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var data = {
                id: document.getElementById('stuId').value,
                name: document.getElementById('stuName').value,
                gender: document.getElementById('stuGender').value,
                class: document.getElementById('stuClass').value,
                birthday: document.getElementById('stuBirthday').value
            };
            var editId = document.getElementById('stuEditId').value;
            if (editId) {
                api('PUT', '/api/students/' + editId, data).then(function(d) {
                    showMessage(d.message, d.success);
                    if (d.success) { closeModal('studentModal'); loadStudents(); }
                });
            } else {
                api('POST', '/api/students', data).then(function(d) {
                    showMessage(d.message, d.success);
                    if (d.success) { closeModal('studentModal'); loadStudents(); }
                });
            }
        });

        function deleteStudent(id) {
            if (!confirm('确定要删除学生 ' + id + ' 吗？')) return;
            api('DELETE', '/api/students/' + id).then(function(d) {
                showMessage(d.message, d.success);
                if (d.success) loadStudents();
            });
        }

        // ====== 班级管理 ======
        function loadClasses() {
            api('GET', '/api/classes').then(function(d) {
                if (!d.success) return;
                var rows = d.data.map(function(c) { return { id: c.id, 编号: c.id, 班级名称: c.name, 年级: c.grade }; });
                document.getElementById('classesTable').innerHTML = buildTable(
                    ['编号','班级名称','年级'], rows,
                    [
                        { label:'删除', onclick:'deleteClass("{id}")' }
                    ]
                );
            });
        }

        function showClassModal() {
            var name = prompt('请输入班级名称（如：高一4班）：');
            if (!name) return;
            var grade = prompt('请输入年级（如：高一）：');
            if (!grade) return;
            api('POST', '/api/classes', { name: name, grade: grade }).then(function(d) {
                showMessage(d.message, d.success);
                if (d.success) loadClasses();
            });
        }

        function deleteClass(id) {
            if (!confirm('确定删除该班级？')) return;
            api('DELETE', '/api/classes/' + id).then(function(d) {
                showMessage(d.message, d.success);
                if (d.success) loadClasses();
            });
        }

        // ====== 考试管理 ======
        function loadExams() {
            api('GET', '/api/exams').then(function(d) {
                if (!d.success) return;
                var rows = d.data.map(function(e) { return { id: e.id, 编号: e.id, 考试名称: e.name, 日期: e.date, 状态: e.status, 科目数: e.subjects.length }; });
                document.getElementById('examsTable').innerHTML = buildTable(
                    ['编号','考试名称','日期','状态','科目数'], rows,
                    [
                        { label:'发布', onclick:'publishExam("{id}")' },
                        { label:'撤回', onclick:'retractExam("{id}")' },
                        { label:'删除', onclick:'deleteExam("{id}")' }
                    ]
                );
            });
        }

        function showExamModal() {
            var name = prompt('请输入考试名称：');
            if (!name) return;
            var date = prompt('请输入日期（YYYY-MM-DD）：');
            if (!date) return;
            var subs = prompt('请输入科目，用逗号分隔（如：语文,数学,英语）：');
            if (!subs) return;
            var subjects = subs.split(',').map(function(s) { return s.trim(); });
            api('POST', '/api/exams', { name: name, date: date, subjects: subjects }).then(function(d) {
                showMessage(d.message, d.success);
                if (d.success) { loadExams(); loadExamSelects(); }
            });
        }

        function publishExam(id) {
            api('PUT', '/api/exams/' + id + '/publish').then(function(d) {
                showMessage(d.message, d.success);
                if (d.success) loadExams();
            });
        }

        function retractExam(id) {
            api('PUT', '/api/exams/' + id + '/retract').then(function(d) {
                showMessage(d.message, d.success);
                if (d.success) loadExams();
            });
        }

        function deleteExam(id) {
            if (!confirm('确定删除该考试？')) return;
            api('DELETE', '/api/exams/' + id).then(function(d) {
                showMessage(d.message, d.success);
                if (d.success) { loadExams(); loadExamSelects(); }
            });
        }

        // ====== 成绩管理 ======
        function loadGrades() {
            var examId = document.getElementById('gradeExam').value;
            var url = '/api/grades';
            if (examId) url += '?exam_id=' + examId;
            api('GET', url).then(function(d) {
                if (!d.success) return;
                var rows = [];
                d.data.forEach(function(g) {
                    var row = { id: g.student_id + '_' + g.exam_id, 学号: g.student_id, 考试: g.exam_id };
                    for (var k in g.scores) { row[k] = g.scores[k]; }
                    row['操作'] = '';
                    rows.push(row);
                });
                // Build headers dynamically
                var headers = ['学号','考试'];
                var seenSubjects = {};
                rows.forEach(function(r) {
                    for (var k in r) {
                        if (k !== 'id' && k !== '学号' && k !== '考试' && k !== '操作') {
                            seenSubjects[k] = true;
                        }
                    }
                });
                Object.keys(seenSubjects).forEach(function(s) { headers.push(s); });
                document.getElementById('gradesTable').innerHTML = buildTable(headers, rows, []);
            });
        }

        function showGradeModal() {
            document.getElementById('gradeModal').classList.add('show');
            document.getElementById('gScores').innerHTML = '';
            // Load students into dropdown
            api('GET', '/api/students?size=100').then(function(d) {
                var opts = '<option value="">选择学生</option>';
                d.data.forEach(function(s) { opts += '<option value="' + s.id + '">' + s.name + ' (' + s.id + ')</option>'; });
                document.getElementById('gStudent').innerHTML = opts;
            });
        }

        document.getElementById('gradeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var examId = document.getElementById('gExam').value;
            var studentId = document.getElementById('gStudent').value;
            var scores = {};
            document.querySelectorAll('.gscore').forEach(function(el) {
                var sub = el.getAttribute('data-subject');
                var val = el.value;
                if (val) scores[sub] = val;
            });
            if (!examId || !studentId) { alert('请选择考试和学生'); return; }
            api('POST', '/api/grades', { student_id: studentId, exam_id: examId, scores: scores }).then(function(d) {
                showMessage(d.message, d.success);
                if (d.success) { closeModal('gradeModal'); loadGrades(); }
            });
        });

        function showImportModal() {
            document.getElementById('importModal').classList.add('show');
        }

        function doImport() {
            var examId = document.getElementById('importExam').value;
            var csv = document.getElementById('importCSV').value;
            if (!examId || !csv) { alert('请选择考试并输入CSV内容'); return; }
            api('POST', '/api/grades/import', { exam_id: examId, csv: csv }).then(function(d) {
                showMessage(d.message, d.success);
                if (d.success) { closeModal('importModal'); loadGrades(); }
            });
        }

        function exportCSV() {
            var examId = document.getElementById('gradeExam').value;
            if (!examId) { alert('请先选择考试'); return; }
            api('GET', '/api/grades/export?exam_id=' + examId).then(function(d) {
                if (!d.success) { alert(d.message); return; }
                var blob = new Blob(['\uFEFF' + d.data.csv], { type: 'text/csv;charset=utf-8' });
                var a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'grades.csv';
                a.click();
            });
        }

        // ====== 统计分析 ======
        function loadStats() {
            var examId = document.getElementById('statsExam').value;
            if (!examId) return;

            // 排名
            api('GET', '/api/stats/rank?exam_id=' + examId + '&type=total').then(function(d) {
                if (d.success && d.data) {
                    var rows = d.data.slice(0, 10).map(function(r) {
                        return { 排名: r.rank, 学号: r.student_id, 姓名: r.name, 班级: r.class, 总分: r.total_score, 平均分: r.avg_score };
                    });
                    document.getElementById('rankTable').innerHTML = buildTable(['排名','学号','姓名','班级','总分','平均分'], rows);
                }
            });

            // 班级对比
            api('GET', '/api/stats/class-compare?exam_id=' + examId).then(function(d) {
                if (d.success && d.data) {
                    var rows = d.data.map(function(c) {
                        return {
                            班级: c.class_name,
                            人数: c.student_count,
                            平均分: c.avg_score,
                            最高分: c.max_score,
                            最低分: c.min_score,
                            优秀率: (c.excellent_rate || '0') + '%',
                            及格率: (c.pass_rate || '0') + '%'
                        };
                    });
                    document.getElementById('classCompareTable').innerHTML = buildTable(
                        ['班级','人数','平均分','最高分','最低分','优秀率','及格率'], rows
                    );
                }
            });

            // 统计摘要
            api('GET', '/api/stats/rank?exam_id=' + examId + '&type=total').then(function(d) {
                if (!d.success || !d.data) return;
                var totalStudents = d.data.length;
                var failCount = 0;
                var excellentCount = 0;
                d.data.forEach(function(r) {
                    if (parseFloat(r.avg_score) < 60) failCount++;
                    if (parseFloat(r.avg_score) >= 85) excellentCount++;
                });
                document.getElementById('statsSummary').innerHTML =
                    '<div class="stat-card"><div class="value">' + totalStudents + '</div><div class="label">总人数</div></div>' +
                    '<div class="stat-card"><div class="value">' + excellentCount + '</div><div class="label">优秀人数(>=85)</div></div>' +
                    '<div class="stat-card"><div class="value">' + failCount + '</div><div class="label">不及格人数(<60)</div></div>' +
                    '<div class="stat-card"><div class="value">' + (totalStudents>0 ? ((excellentCount/totalStudents)*100).toFixed(1) : 0) + '%</div><div class="label">优秀率</div></div>';
            });
        }

        // ====== 操作日志 ======
        var logPage = 1;
        function loadLogs() {
            api('GET', '/api/logs?page=' + logPage + '&size=30').then(function(d) {
                if (!d.success) return;
                var rows = d.data.map(function(l) {
                    return { 用户: l.user, 操作: l.action, 时间: l.timestamp };
                });
                document.getElementById('logsTable').innerHTML = buildTable(['用户','操作','时间'], rows);
            });
        }

        // 启动
        init();
