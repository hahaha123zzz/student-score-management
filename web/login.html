<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩管理系统 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <h1>成绩管理系统</h1>
        <p class="subtitle">高中学生成绩管理平台</p>
        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <div class="form-group">
                <label>角色</label>
                <select id="role">
                    <option value="admin">管理员</option>
                    <option value="teacher">教师</option>
                    <option value="student">学生</option>
                </select>
            </div>
            <div id="errorMsg" class="error-msg" style="display:none;"></div>
            <button type="submit" class="btn-primary">登 录</button>
        </form>
        <div class="hint">
            <p>测试账号：admin / 123456（管理员）</p>
            <p>测试账号：S2024001 / 123456（学生）</p>
        </div>
    </div>

    <script>
        // 页面加载时检查是否已登录
        const token = localStorage.getItem('token');
        if (token) {
            fetch('/api/auth/check', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    if (data.data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else if (data.data.role === 'teacher') {
                        window.location.href = 'teacher.html';
                    } else {
                        window.location.href = 'student.html';
                    }
                }
            })
            .catch(function() {});
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.style.display = 'none';

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data));
                    if (data.data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else if (data.data.role === 'teacher') {
                        window.location.href = 'teacher.html';
                    } else {
                        window.location.href = 'student.html';
                    }
                } else {
                    errorMsg.textContent = data.message || '登录失败';
                    errorMsg.style.display = 'block';
                }
            })
            .catch(function() {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.style.display = 'block';
            });
        });
    </script>
</body>
</html>
