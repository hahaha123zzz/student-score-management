<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EduGrade - 用户登录</title>
  <link rel="stylesheet" href="css/style.css?v=4">
  <style>
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 40%,#2563eb 100%);padding:24px}
    .login-card{width:420px;max-width:100%;background:rgba(255,255,255,.96);border-radius:22px;padding:34px;box-shadow:0 24px 60px rgba(15,23,42,.28)}
    .login-logo{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff;font-size:24px;font-weight:700;margin:0 auto 16px}
    .login-title{text-align:center;margin-bottom:22px}
    .login-title h1{margin:0;font-size:28px;color:#0f172a}
    .login-title p{margin:8px 0 0;color:#64748b;font-size:14px}
    .stack-gap{display:grid;gap:14px}
    .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
    .quick-grid button{padding:10px 12px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;cursor:pointer}
    .err{min-height:18px;font-size:12px;color:#dc2626;margin-top:10px;text-align:center}
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">E</div>
      <div class="login-title">
        <h1>EduGrade</h1>
        <p>高中学生成绩管理系统</p>
      </div>

      <form id="loginForm" class="stack-gap">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" name="username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" placeholder="请输入密码">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">登录系统</button>
        <div id="loginError" class="err"></div>
      </form>

      <div style="margin-top:20px">
        <div style="font-size:12px;color:#64748b;margin-bottom:8px">快速测试账号</div>
        <div class="quick-grid">
          <button type="button" data-user="admin" data-pass="123456">管理员</button>
          <button type="button" data-user="S2024001" data-pass="123456">学生 张三</button>
          <button type="button" data-user="S2024002" data-pass="123456">学生 李四</button>
          <button type="button" data-user="S2024003" data-pass="123456">学生 王明</button>
        </div>
      </div>

      <div style="margin-top:16px;text-align:center;font-size:12px">
        <a href="index.html" style="color:#64748b;text-decoration:none">返回首页</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    (function() {
      const form = document.getElementById('loginForm');
      const errorBox = document.getElementById('loginError');

      function go(role) {
        window.location.href = role === 'admin' ? 'admin.html' : 'student.html';
      }

      async function submitLogin(username, password) {
        errorBox.textContent = '';
        const result = await API.login(username, password);
        if (!result.success || !result.data) {
          errorBox.textContent = (result && result.message) || '登录失败';
          return;
        }
        localStorage.setItem('token', result.data.token || '');
        localStorage.setItem('user_id', result.data.user_id || '');
        localStorage.setItem('user_name', result.data.name || '');
        localStorage.setItem('user_role', result.data.role || '');
        go(result.data.role || 'student');
      }

      form.addEventListener('submit', function(event) {
        event.preventDefault();
        const data = new FormData(form);
        const username = String(data.get('username') || '').trim();
        const password = String(data.get('password') || '');
        if (!username || !password) {
          errorBox.textContent = '请输入用户名和密码';
          return;
        }
        submitLogin(username, password);
      });

      document.querySelectorAll('[data-user]').forEach(function(button) {
        button.addEventListener('click', function() {
          form.querySelector('[name="username"]').value = this.getAttribute('data-user');
          form.querySelector('[name="password"]').value = this.getAttribute('data-pass');
          submitLogin(this.getAttribute('data-user'), this.getAttribute('data-pass'));
        });
      });
    })();
  </script>
</body>
</html>
