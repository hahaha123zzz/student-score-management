<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGrade - 学生中心</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2>Edu<span>Grade</span></h2>
            <div class="ver">学生中心</div>
        </div>
        <nav class="sidebar-nav">
            <a href="#dashboard-section" class="active" data-section="dashboard-section"><span class="nv">&#9679;</span> 首页概览</a>
            <a href="#grades-section" data-section="grades-section"><span class="nv">&#9633;</span> 我的成绩</a>
            <a href="#rankings-section" data-section="rankings-section"><span class="nv">&#9733;</span> 排名查看</a>
            <a href="#trend-section" data-section="trend-section"><span class="nv">&#9650;</span> 成绩趋势</a>
            <a href="#ability-section" data-section="ability-section"><span class="nv">&#9673;</span> 能力图谱</a>
            <a href="#errors-section" data-section="errors-section"><span class="nv">&#8854;</span> 我的错题</a>
            <a href="#imbalance-section" data-section="imbalance-section"><span class="nv">&#9776;</span> 偏科分析</a>
            <a href="#suggestions-section" data-section="suggestions-section"><span class="nv">&#9734;</span> 学习建议</a>
            <a data-section="goals-section"><span class="nv">&#127919;</span> 学习目标</a>
            <a data-section="knowledge-section"><span class="nv">&#129504;</span> 知识图谱</a>
            <a data-section="review-section"><span class="nv">&#128214;</span> 复习计划</a>
            <a data-section="portfolio-section"><span class="nv">&#128188;</span> 成长档案</a>
            <a data-section="mood-section"><span class="nv">&#128578;</span> 心情打卡</a>
            <a href="#info-section" data-section="info-section"><span class="nv">&#9700;</span> 个人信息</a>
            <a href="#password-section" data-section="password-section"><span class="nv">&#9737;</span> 修改密码</a>
        </nav>
        <div class="sidebar-footer">
            <div class="av" id="sidebar-avatar"></div>
            <div class="ui">
                <div class="un" id="sidebar-name"></div>
                <div class="ur" id="sidebar-role">学生</div>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <h2>学生中心</h2>
            <div class="topbar-actions">
                <button class="btn btn-ghost btn-sm" onclick="toggleTheme()" title="切换主题">&#9681; 主题</button>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='login.html'">返回登录</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">退出登录</button>
            </div>
        </div>

        <div class="content">
            <section class="page-section active" id="dashboard-section">
                <div class="card mb-16">
                    <div class="card-header">
                        <div class="card-title" id="dash-card-title">欢迎回来</div>
                    </div>
                    <div class="card-body" id="dashboard-welcome"></div>
                </div>
                <div class="stats-grid" id="dashboard-stats"></div>
            </section>

            <section class="page-section" id="grades-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">我的成绩</div>
                    </div>
                    <div class="card-body">
                        <div id="grades-result"></div>
                        <div id="grades-content"></div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="rankings-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">排名查看</div>
                    </div>
                    <div class="card-body">
                        <div id="rankings-result"></div>
                        <div id="rankings-content"></div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="trend-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">成绩趋势</div>
                    </div>
                    <div class="card-body">
                        <div id="trend-result"></div>
                        <div id="trend-content">
                            <div class="chart-row single">
                                <div class="chart-box"><canvas id="trendChart"></canvas></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="ability-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">能力图谱</div>
                    </div>
                    <div class="card-body">
                        <div class="filter-row mb-16">
                            <select id="abilityExamSelect" style="min-width:220px"><option value="">-- 选择考试 --</option></select>
                        </div>
                        <div id="ability-result"></div>
                        <div class="chart-row single">
                            <div class="chart-box"><canvas id="abilityChart"></canvas></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="errors-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">我的错题</div>
                    </div>
                    <div class="card-body">
                        <div class="tabs">
                            <div class="tab active" data-err-tab="err-list">&#128196; 错题列表</div>
                            <div class="tab" data-err-tab="err-stats">&#128200; 错题统计</div>
                        </div>
                        <div id="errors-result"></div>
                        <div id="errors-list-content">
                            <div class="filter-row mb-16">
                                <select id="errSubjectFilter" style="min-width:160px"><option value="">全部科目</option></select>
                            </div>
                            <div class="table-wrap" id="errors-table-wrap"></div>
                            <div class="pagination" id="errors-pagination"></div>
                        </div>
                        <div id="errors-stats-content" class="chart-row" style="display:none;">
                            <div class="chart-box"><canvas id="errByTypeChart"></canvas></div>
                            <div class="chart-box"><canvas id="errBySubjectChart"></canvas></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="imbalance-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">偏科分析</div>
                    </div>
                    <div class="card-body">
                        <div id="imbalance-result"></div>
                        <div id="imbalance-content"></div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="suggestions-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">学习建议</div>
                    </div>
                    <div class="card-body">
                        <div id="suggestions-result"></div>
                        <div id="suggestions-content"></div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="goals-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">学习目标</div>
                    </div>
                    <div class="card-body">
                        <div id="goals-form-area" style="margin-bottom:20px">
                            <div class="form-group">
                                <label>科目</label>
                                <select id="goalsSubject" style="min-width:200px"><option value="">-- 选择科目 --</option></select>
                            </div>
                            <div class="form-group">
                                <label>目标分数</label>
                                <input type="number" id="goalsTargetScore" style="max-width:200px" placeholder="请输入目标分数" min="0" step="0.5">
                            </div>
                            <div class="form-group">
                                <label>关联考试</label>
                                <select id="goalsExam" style="min-width:200px"><option value="">-- 选择考试（可选） --</option></select>
                            </div>
                            <div class="form-group">
                                <label>截止日期</label>
                                <input type="date" id="goalsDeadline" style="max-width:200px">
                            </div>
                            <button class="btn btn-primary" onclick="submitGoal()">设置目标</button>
                            <div id="goals-result" style="margin-top:8px"></div>
                        </div>
                        <div id="goals-table-wrap"></div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="knowledge-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">知识图谱</div>
                    </div>
                    <div class="card-body">
                        <div id="knowledge-result"></div>
                        <div id="knowledge-content"></div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="review-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">复习计划</div>
                    </div>
                    <div class="card-body">
                        <div id="review-result"></div>
                        <div id="review-content"></div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="portfolio-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">成长档案</div>
                    </div>
                    <div class="card-body">
                        <div id="portfolio-result"></div>
                        <div id="portfolio-content"></div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="mood-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">心情打卡</div>
                    </div>
                    <div class="card-body">
                        <div id="mood-result"></div>
                        <div id="mood-selector" style="margin-bottom:16px">
                            <div style="font-size:13px;color:var(--text2);margin-bottom:8px">选择今天的心情：</div>
                            <div class="flex items-center gap-8" id="mood-buttons">
                                <button class="btn btn-ghost btn-sm mood-btn" data-mood="1" style="font-size:28px;line-height:1;padding:8px 12px">&#128577;</button>
                                <button class="btn btn-ghost btn-sm mood-btn" data-mood="2" style="font-size:28px;line-height:1;padding:8px 12px">&#128542;</button>
                                <button class="btn btn-ghost btn-sm mood-btn" data-mood="3" style="font-size:28px;line-height:1;padding:8px 12px">&#128528;</button>
                                <button class="btn btn-ghost btn-sm mood-btn" data-mood="4" style="font-size:28px;line-height:1;padding:8px 12px">&#128522;</button>
                                <button class="btn btn-ghost btn-sm mood-btn" data-mood="5" style="font-size:28px;line-height:1;padding:8px 12px">&#128525;</button>
                            </div>
                        </div>
                        <div id="mood-note-area" style="margin-bottom:12px;display:none">
                            <textarea id="moodNote" placeholder="有什么想记录的吗？（可选）" style="max-width:400px;height:80px"></textarea>
                        </div>
                        <button class="btn btn-primary" onclick="submitMood()">打卡</button>
                        <div id="mood-checkins"></div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="info-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">个人信息</div>
                    </div>
                    <div class="card-body">
                        <div id="info-result"></div>
                        <div id="info-content"></div>
                    </div>
                </div>
            </section>

            <section class="page-section" id="password-section">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">修改密码</div>
                    </div>
                    <div class="card-body">
                        <div id="pwd-result"></div>
                        <div id="pwd-content">
                            <div class="form-group">
                                <label>原密码</label>
                                <input type="password" id="oldPwd" placeholder="请输入原密码" style="max-width:400px">
                            </div>
                            <div class="form-group">
                                <label>新密码</label>
                                <input type="password" id="newPwd" placeholder="请输入新密码（至少6位）" style="max-width:400px">
                            </div>
                            <div class="form-group">
                                <label>确认新密码</label>
                                <input type="password" id="confirmPwd" placeholder="请再次输入新密码" style="max-width:400px">
                            </div>
                            <button class="btn btn-primary" onclick="changePassword()">修改密码</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="js/common.js"></script>
<script src="js/api.js"></script>
<script>
(function() {
    if (!Common.initAuth('student')) return;

    var studentId = getUserId();
    var studentData = null;
    var examsCache = [];
    var errorsPage = 1;
    var trendChart = null;
    var abilityChart = null;
    var errByTypeChart = null;
    var errBySubjectChart = null;

    var sectionLoaders = {
        'dashboard-section': loadDashboard,
        'grades-section': loadGrades,
        'rankings-section': loadRankings,
        'trend-section': loadTrend,
        'ability-section': loadAbilitySelector,
        'errors-section': function() { loadErrorSubjects(); loadErrors(); },
        'imbalance-section': loadImbalance,
        'suggestions-section': loadSuggestions,
        'goals-section': loadGoals,
        'knowledge-section': loadKnowledgeMap,
        'review-section': loadReviewPlan,
        'portfolio-section': loadPortfolio,
        'mood-section': loadMoodCheckins,
        'info-section': loadInfo
    };

    document.getElementById('sidebar-name').textContent = getUserName();
    document.getElementById('sidebar-role').textContent = '学生';
    var avatarEl = document.getElementById('sidebar-avatar');
    var uname = getUserName();
    avatarEl.textContent = uname ? uname.charAt(0).toUpperCase() : 'S';

    $$('.sidebar-nav a').forEach(function(link) {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            var sectionId = this.getAttribute('data-section');
            navigateTo(sectionId);
            var loader = sectionLoaders[sectionId];
            if (loader) loader();
        });
    });

    $$('.tab[data-err-tab]').forEach(function(tab) {
        tab.addEventListener('click', function() {
            var tabName = this.getAttribute('data-err-tab');
            $$('.tab[data-err-tab]').forEach(function(t) { t.classList.remove('active'); });
            this.classList.add('active');
            if (tabName === 'err-list') {
                document.getElementById('errors-list-content').style.display = '';
                document.getElementById('errors-stats-content').style.display = 'none';
            } else {
                document.getElementById('errors-list-content').style.display = 'none';
                document.getElementById('errors-stats-content').style.display = '';
                loadErrorStats();
            }
        });
    });

    document.getElementById('abilityExamSelect').addEventListener('change', function() {
        var eid = this.value;
        if (eid) loadAbility(eid);
    });

    document.getElementById('errSubjectFilter').addEventListener('change', function() {
        loadErrors(1);
    });

    function showLoading(target) {
        var el = typeof target === 'string' ? document.getElementById(target) : target;
        if (!el) return function() {};
        el.innerHTML = '<div class="loading"><span class="spinner"></span> 加载中...</div>';
        return function() {};
    }

    function showResult(target, type, msg) {
        var el = typeof target === 'string' ? document.getElementById(target) : target;
        if (!el) return;
        el.innerHTML = '<div class="alert alert-' + type + '">' + Common.escapeHtml(msg) + '</div>';
    }

    function showEmpty(target, icon, text) {
        var el = typeof target === 'string' ? document.getElementById(target) : target;
        if (!el) return;
        el.innerHTML = '<div class="empty"><div class="empty-icon">' + icon + '</div><p>' + Common.escapeHtml(text) + '</p></div>';
    }

    function loadExamsCache(callback) {
        if (examsCache.length > 0) { callback(examsCache); return; }
        API.exams.list('published').then(function(res) {
            if ((res && res.success) && res.data) {
                examsCache = Array.isArray(res.data) ? res.data : (res.data.list || res.data.records || []);
            }
            callback(examsCache);
        }).catch(function() { callback(examsCache); });
    }

    function loadDashboard() {
        showLoading('dashboard-welcome');
        document.getElementById('dashboard-stats').innerHTML = '';
        document.getElementById('dash-card-title').textContent = '欢迎回来，' + getUserName();

        API.grades.student(studentId).then(function(res) {
            var gradesList = [];
            if ((res && res.success) && res.data) {
                gradesList = res.data.grades || res.data;
                if (!Array.isArray(gradesList)) gradesList = [];
            }

            var latestExam = '', latestTotal = 0, warningCount = 0;
            if (gradesList.length > 0) {
                var latest = gradesList[gradesList.length - 1];
                latestExam = latest.exam_name || '';
                if (latest.scores) {
                    Object.values(latest.scores).forEach(function(s) {
                        if (s != null) latestTotal += parseFloat(s);
                    });
                }
                gradesList.forEach(function(g) {
                    if (g.scores) {
                        Object.values(g.scores).forEach(function(s) {
                            if (s != null && parseFloat(s) < 60) warningCount++;
                        });
                    }
                });
            }

            var statsEl = document.getElementById('dashboard-stats');
            statsEl.innerHTML =
                '<div class="stat-card"><div class="si">&#128200;</div><div class="stat-info"><h3>' + latestTotal.toFixed(1) + '</h3><p>最新总分</p></div></div>' +
                '<div class="stat-card"><div class="si">&#128221;</div><div class="stat-info"><h3 class="' + (latestExam ? '' : 's-d') + '" style="font-size:' + (latestExam.length > 6 ? '13px' : '16px') + '">' + Common.escapeHtml(latestExam || '暂无') + '</h3><p>最近考试</p></div></div>' +
                '<div class="stat-card"><div class="si">&#9888;</div><div class="stat-info"><h3>' + warningCount + '</h3><p>预警科目数(&lt;60分)</p></div></div>' +
                '<div class="stat-card"><div class="si">&#128218;</div><div class="stat-info"><h3>' + gradesList.length + '</h3><p>参加考试次数</p></div></div>';

            var grade = gradesList.length > 0 ? latestTotal / Math.max(1, (latest.scores ? Object.keys(latest.scores).filter(function(k) { return latest.scores[k] != null; }).length : 1)) : 0;
            var gl = Common.gradeLabel(grade);
            document.getElementById('dashboard-welcome').innerHTML =
                '<p style="color:var(--text2);font-size:14px;line-height:1.8">这是你的学习概览，你的综合等级为 <span class="' + gl.cls + '" style="font-weight:700;font-size:18px">' + gl.text + '</span>。<br>点击左侧导航或下方模块查看更详细的学业数据。</p>';
        }).catch(function() {
            document.getElementById('dashboard-stats').innerHTML = '';
            showEmpty('dashboard-welcome', '&#128100;', '加载失败，请检查网络连接');
        });
    }

    function loadGrades() {
        showLoading('grades-content');
        document.getElementById('grades-result').innerHTML = '';

        API.grades.student(studentId).then(function(res) {
            if (!res || !res.success || !res.data) {
                showEmpty('grades-content', '&#128196;', '暂无成绩数据');
                return;
            }
            renderGrades(res.data);
        }).catch(function() {
            showEmpty('grades-content', '&#128196;', '加载失败');
        });
    }

    function renderGrades(data) {
        var gradesList = data.grades || data;
        if (!gradesList || !gradesList.length) {
            showEmpty('grades-content', '&#128196;', '暂无成绩数据');
            return;
        }

        var subjects = new Set();
        gradesList.forEach(function(g) {
            if (g.scores) Object.keys(g.scores).forEach(function(s) { subjects.add(s); });
        });
        var subjectNames = Array.from(subjects);

        var html = '<div class="table-wrap"><table><thead><tr>';
        html += '<th>考试名称</th><th>日期</th>';
        subjectNames.forEach(function(s) { html += '<th>' + Common.escapeHtml(s) + '</th>'; });
        html += '<th>总分</th><th>等级</th></tr></thead><tbody>';

        gradesList.forEach(function(g) {
            html += '<tr>';
            html += '<td>' + Common.escapeHtml(g.exam_name || '-') + '</td>';
            html += '<td>' + Common.formatDate(g.exam_date || g.date) + '</td>';
            var scores = g.scores || {};
            var total = 0, count = 0;
            subjectNames.forEach(function(sub) {
                var score = scores[sub];
                html += '<td>' + (score != null ? parseInt(score) : '-') + '</td>';
                if (score != null) { total += parseFloat(score); count++; }
            });
            html += '<td><b>' + (count > 0 ? total.toFixed(1) : '-') + '</b></td>';
            var avg = count > 0 ? total / count : 0;
            var grade = Common.gradeLabel(avg);
            html += '<td class="' + grade.cls + '">' + grade.text + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table></div>';
        document.getElementById('grades-content').innerHTML = html;
    }

    function loadRankings() {
        showLoading('rankings-content');
        document.getElementById('rankings-result').innerHTML = '';

        API.grades.student(studentId).then(function(res) {
            if (!res || !res.success || !res.data) {
                showEmpty('rankings-content', '&#127942;', '暂无排名数据');
                return;
            }
            var gradesList = res.data.grades || res.data;
            if (!gradesList || !gradesList.length) {
                showEmpty('rankings-content', '&#127942;', '暂无成绩数据');
                return;
            }

            var examIds = [];
            gradesList.forEach(function(g) { if (g.exam_id) examIds.push(g.exam_id); });
            if (!examIds.length) { showEmpty('rankings-content', '&#127942;', '暂无排名数据'); return; }

            var promises = examIds.map(function(eid) {
                return API.stats.rank(eid, 'grade').then(function(r) { return { examId: eid, data: r }; }).catch(function() { return { examId: eid, data: null }; });
            });

            Promise.all(promises).then(function(results) {
                renderRankings(results, gradesList);
            });
        }).catch(function() {
            showEmpty('rankings-content', '&#127942;', '加载失败');
        });
    }

    function renderRankings(rankResults, gradesList) {
        var html = '<div class="table-wrap"><table><thead><tr><th>考试名称</th><th>日期</th><th>总分</th><th>年级排名</th><th>班级排名</th></tr></thead><tbody>';

        rankResults.forEach(function(r, idx) {
            var g = gradesList[idx] || {};
            html += '<tr>';
            html += '<td>' + Common.escapeHtml(g.exam_name || '-') + '</td>';
            html += '<td>' + Common.formatDate(g.exam_date || g.date) + '</td>';
            var scores = g.scores || {};
            var total = 0, count = 0;
            Object.values(scores).forEach(function(s) { if (s != null) { total += parseFloat(s); count++; } });
            html += '<td><b>' + (count > 0 ? total.toFixed(1) : '-') + '</b></td>';

            if (r.data && r.data.success && r.data.data) {
                var rankData = r.data.data;
                var gradeRank = null, classRank = null;
                if (Array.isArray(rankData)) {
                    rankData.forEach(function(item) {
                        if (String(item.student_id) === String(studentId)) {
                            gradeRank = item.grade_rank != null ? item.grade_rank : item.rank;
                            classRank = item.class_rank;
                        }
                    });
                }
                var gCls = gradeRank && gradeRank <= 3 ? 'badge-success' : gradeRank && gradeRank <= 10 ? 'badge-primary' : 'badge-info';
                var cCls = classRank && classRank <= 3 ? 'badge-success' : classRank && classRank <= 10 ? 'badge-primary' : 'badge-info';

    function renderTrend(data) {
        var trendList = data.trends || data;
        if (!trendList || !trendList.length) {
            resetTrendCanvas();
            showResult('trend-result', 'info', '暂无趋势数据');
            return;
        }

        resetTrendCanvas();

        var labels = [], totals = [];
        var subjectsMap = {};

        trendList.forEach(function(t) {
            labels.push(t.exam_name || t.name || '-');
            totals.push(t.total_score || t.total || 0);
            if (t.scores) {
                Object.keys(t.scores).forEach(function(sub) {
                    if (!subjectsMap[sub]) subjectsMap[sub] = [];
                    subjectsMap[sub].push(t.scores[sub] != null ? parseFloat(t.scores[sub]) : null);
                });
            }
        });

        var colors = ['#4361ee','#2ec4b6','#ff9f1c','#e71d36','#7209b7','#3a0ca3','#4cc9f0','#f72585','#06d6a0','#118ab2','#ef476f','#ffd166'];
        var datasets = [{
            label: '总成绩',
            data: totals,
            borderColor: '#6366f1',
            backgroundColor: function(context) {
                if (!context.chart.chartArea) return;
                var gradient = context.chart.ctx.createLinearGradient(0, context.chart.chartArea.top, 0, context.chart.chartArea.bottom);
                gradient.addColorStop(0, 'rgba(99,102,241,0.25)');
                gradient.addColorStop(1, 'rgba(99,102,241,0.02)');
                return gradient;
            },
            fill: true,
            tension: 0.35,
            pointRadius: 5,
            pointBackgroundColor: '#6366f1',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointHoverRadius: 7,
            borderWidth: 2.5
        }];

        var ci = 0;
        Object.keys(subjectsMap).forEach(function(sub) {
            datasets.push({
                label: sub,
                data: subjectsMap[sub],
                borderColor: colors[(ci + 1) % colors.length],
                backgroundColor: 'transparent',
                borderDash: [6, 3],
                tension: 0.35,
                pointRadius: 3,
                pointHoverRadius: 5,
                borderWidth: 1.5
            });
            ci++;
        });

        var ctx = document.getElementById('trendChart').getContext('2d');
        trendChart = new Chart(ctx, {
            type: 'line',
            data: { labels: labels, datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: {
                    legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20, boxWidth: 8 } }
                },
                scales: {
                    y: { beginAtZero: false, grid: { color: function(ctx) { return ctx.tick.value === 0 ? 'var(--border)' : 'rgba(0,0,0,0.04)'; } } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    function renderImbalance(data) {
        var items = data.imbalances || data;
        if (!Array.isArray(items)) {
            items = [];
            if (data.subjects) {
                Object.keys(data.subjects).forEach(function(k) {
                    items.push({ subject: k, index: data.subjects[k], level: data.levels ? data.levels[k] : '' });
                });
            }
        }

        if (!items.length) {
            showEmpty('imbalance-content', '&#9878;', '暂无偏科分析数据');
            return;
        }

        var html = '';
        items.forEach(function(item) {
            var idx = parseFloat(item.index || item.value || 0);
            var pct = (idx * 100).toFixed(0);
            var cls = idx > 0.25 ? 'badge-success' : idx > 0 ? 'badge-info' : idx > -0.25 ? 'badge-warning' : 'badge-danger';
            var barWidth = Math.min(Math.abs(idx) * 220, 220);
            var barColor = idx >= 0 ? 'var(--success)' : 'var(--danger)';
            var label = idx >= 0 ? '优势 +' + pct + '%' : '劣势 ' + pct + '%';

            html += '<div style="margin-bottom:18px">';
            html += '<div class="flex items-center justify-between mb-8" style="font-size:13px">';
            html += '<b style="color:var(--text)">' + Common.escapeHtml(item.subject) + '</b>';
            html += '<span class="badge ' + cls + '">' + label + '</span>';
            html += '</div>';
            html += '<div style="background:var(--border-light);border-radius:8px;height:22px;overflow:hidden;position:relative">';
            html += '<div style="position:absolute;left:50%;width:2px;height:100%;background:var(--text3);opacity:.4"></div>';
            if (idx >= 0) {
                html += '<div style="height:100%;width:' + barWidth + 'px;background:' + barColor + ';margin-left:50%;border-radius:0 8px 8px 0;transition:width .5s var(--ease-out);box-shadow:0 0 8px rgba(5,150,105,.3)"></div>';
            } else {
                html += '<div style="height:100%;width:' + barWidth + 'px;background:' + barColor + ';margin-left:' + (50 - barWidth * 0.5 / Math.max(1, Math.abs(idx) * (220 / 220)) * 1) + '%;border-radius:8px 0 0 8px;transition:width .5s var(--ease-out);box-shadow:0 0 8px rgba(220,38,38,.3)"></div>';
            }
            html += '</div>';
            if (item.level) {
                html += '<div style="font-size:11px;color:var(--text3);margin-top:4px">' + Common.escapeHtml(item.level) + '</div>';
            }
            html += '</div>';
        });

        var overallLevel = data.overall_level || data.level || '';
        var overallText = data.overall_text || data.suggestion || '';
        if (overallLevel) {
            html += '<div class="alert alert-info mt-16"><b>总体偏科程度：</b>' + Common.escapeHtml(overallLevel) + (overallText ? ' &mdash; ' + Common.escapeHtml(overallText) : '') + '</div>';
        }

        document.getElementById('imbalance-content').innerHTML = html;
    }

    window.saveName = function() {
        var newName = document.getElementById('editNameInput').value.trim();
        if (!newName) {
            showResult('info-result', 'error', '姓名不能为空');
            return;
        }
        if (!studentData) return;
        var sid = studentData.id || studentData.student_id;
        API.students.update(sid, { name: newName }).then(function(res) {
            if ((res && res.success) || (res && res.code === 0)) {
                studentData.name = newName;
                studentData.student_name = newName;
                showResult('info-result', 'success', '姓名修改成功');
                document.getElementById('edit-name-form').style.display = 'none';
                localStorage.setItem('user_name', newName);
                document.getElementById('sidebar-name').textContent = newName;
                loadInfo();
            } else {
                showResult('info-result', 'error', (res && res.message) || '修改失败');
            }
        }).catch(function() {
            showResult('info-result', 'error', '网络错误');
        });
    };

    window.changePassword = function() {
        var oldPwd = document.getElementById('oldPwd').value.trim();
        var newPwd = document.getElementById('newPwd').value.trim();
        var confirmPwd = document.getElementById('confirmPwd').value.trim();
        if (!oldPwd || !newPwd || !confirmPwd) {
            showResult('pwd-result', 'error', '请填写所有密码字段');
            return;
        }
        if (newPwd !== confirmPwd) {
            showResult('pwd-result', 'error', '两次输入的新密码不一致');
            return;
        }
        if (newPwd.length < 6) {
            showResult('pwd-result', 'error', '新密码长度不能少于6位');
            return;
        }
        API.changePwd(oldPwd, newPwd).then(function(res) {
            if ((res && res.success) || (res && res.code === 0)) {
                showResult('pwd-result', 'success', '密码修改成功');
                document.getElementById('oldPwd').value = '';
                document.getElementById('newPwd').value = '';
                document.getElementById('confirmPwd').value = '';
            } else {
                showResult('pwd-result', 'error', (res && res.message) || '修改失败');
            }
        }).catch(function() {
            showResult('pwd-result', 'error', '网络错误');
        });
    };

    function loadGoals() {
        showLoading('goals-table-wrap');
        document.getElementById('goals-result').innerHTML = '';
        loadGoalsForm();
        API.goals.get(studentId).then(function(res) {
            if (!res || !res.success || !res.data) {
                showEmpty('goals-table-wrap', '&#127919;', '暂无学习目标');
                return;

            renderGoals(res.data);
        }).catch(function() {
            showEmpty('goals-table-wrap', '&#127919;', '加载失败');

    function loadGoalsForm() {
        API.subjects.list().then(function(res) {
            var subjects = [];
            if ((res && res.success) && res.data) {
                subjects = Array.isArray(res.data) ? res.data : (res.data.list || res.data.records || []);

    function getCurrentScore(subject) {
        if (!examsCache.length) return null;
        var latest = examsCache[examsCache.length - 1];
        return null;
    }

    function renderGoals(data) {
        var list = data.goals || data;
        if (!Array.isArray(list)) list = [];
        if (!list.length) {
            showEmpty('goals-table-wrap', '&#127919;', '暂无学习目标');
            return;
        }

        API.grades.student(studentId).then(function(res) {
            var gradesList = [];
            if ((res && res.success) && res.data) {
                gradesList = res.data.grades || res.data;
                if (!Array.isArray(gradesList)) gradesList = [];
            }

            var subjectScores = {};
            gradesList.forEach(function(g) {
                if (g.scores) {
                    Object.keys(g.scores).forEach(function(sub) {
                        var s = parseFloat(g.scores[sub]);
                        if (!isNaN(s)) {
                            if (!subjectScores[sub] || s > subjectScores[sub]) {
                                subjectScores[sub] = s;
                            }
                        }
                    });
                }
            });

            var html = '<div class="table-wrap"><table><thead><tr><th>科目</th><th>目标分数</th><th>当前最佳</th><th>进度</th><th>考试</th><th>截止日期</th><th>状态</th></tr></thead><tbody>';
            list.forEach(function(g) {
                var subject = g.subject || '-';
                var target = parseFloat(g.target_score || g.target || 0);
                var current = subjectScores[subject] || 0;
                var pct = target > 0 ? Math.min(100, (current / target) * 100) : 0;
                var deadline = g.deadline || '';
                var examName = g.exam_name || '-';
                var achieved = current >= target && target > 0;
                var statusBadge = achieved ? '<span class="badge badge-success">已达成</span>' :
                    (deadline && new Date(deadline) < new Date() ? '<span class="badge badge-danger">未达成</span>' : '<span class="badge badge-primary">进行中</span>');

                var barColor = pct >= 100 ? 'var(--success)' : pct >= 60 ? 'var(--primary)' : pct >= 30 ? 'var(--warning)' : 'var(--danger)';
                html += '<tr>';
                html += '<td><b>' + Common.escapeHtml(subject) + '</b></td>';
                html += '<td>' + target.toFixed(1) + '</td>';
                html += '<td>' + (current > 0 ? current.toFixed(1) : '-') + '</td>';
                html += '<td style="min-width:120px"><div style="background:var(--border-light);border-radius:6px;height:10px;overflow:hidden"><div style="width:' + pct.toFixed(0) + '%;height:100%;background:' + barColor + ';border-radius:6px;transition:width .4s var(--ease-out)"></div></div><small style="font-size:11px;color:var(--text3)">' + pct.toFixed(0) + '%</small></td>';
                html += '<td>' + Common.escapeHtml(examName) + '</td>';
                html += '<td>' + (deadline ? Common.formatDate(deadline) : '-') + '</td>';
                html += '<td>' + statusBadge + '</td>';
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            document.getElementById('goals-table-wrap').innerHTML = html;
        }).catch(function() {
            showEmpty('goals-table-wrap', '&#127919;', '加载成绩数据失败');
        });
    }

    window.submitGoal = function() {
        var subject = document.getElementById('goalsSubject').value;
        var target = document.getElementById('goalsTargetScore').value;
        var exam = document.getElementById('goalsExam').value;
        var deadline = document.getElementById('goalsDeadline').value;

        if (!subject) { showResult('goals-result', 'error', '请选择科目'); return; }
        if (!target || parseFloat(target) <= 0) { showResult('goals-result', 'error', '请输入有效的目标分数'); return; }

        var data = { student_id: studentId, subject: subject, target_score: parseFloat(target), exam_name: exam || undefined, deadline: deadline || undefined };
        API.goals.set(data).then(function(res) {
            if ((res && res.success) || (res && res.code === 0)) {
                showResult('goals-result', 'success', '目标设置成功');
                document.getElementById('goalsTargetScore').value = '';
                document.getElementById('goalsDeadline').value = '';
                loadGoals();
            } else {
                showResult('goals-result', 'error', (res && res.message) || '设置失败');
            }
        }).catch(function() {
            showResult('goals-result', 'error', '网络错误');
        });
    };

    function loadKnowledgeMap() {
        showLoading('knowledge-content');
        document.getElementById('knowledge-result').innerHTML = '';

        API.knowledge.map(studentId).then(function(res) {
            if (!res || !res.success || !res.data) {
                showEmpty('knowledge-content', '&#129504;', '暂无知识图谱数据');
                return;
            }
            renderKnowledgeMap(res.data);
        }).catch(function() {
            showEmpty('knowledge-content', '&#129504;', '加载失败');
        });
    }

    function renderKnowledgeMap(data) {
        var map = data.map || data;
        if (!map || !Object.keys(map).length) {
            showEmpty('knowledge-content', '&#129504;', '暂无知识图谱数据');
            return;
        }

        var masteryMap = { 'mastered': { label: '已掌握', cls: 'badge-success', color: 'var(--success)' },
            'proficient': { label: '良好', cls: 'badge-primary', color: 'var(--primary)' },
            'developing': { label: '发展中', cls: 'badge-warning', color: 'var(--warning)' },
            'needs_work': { label: '需提升', cls: 'badge-danger', color: 'var(--danger)' } };

        var html = '';
        Object.keys(map).forEach(function(subject) {
            var points = map[subject];
            if (!Array.isArray(points)) points = [];
            html += '<div class="card mb-16" style="border:1px solid var(--border)"><div class="card-header"><div class="card-title">' + Common.escapeHtml(subject) + '</div></div><div class="card-body">';
            if (!points.length) {
                html += '<div class="empty"><div class="empty-icon">&#129504;</div><p>暂无知识点</p></div>';
            } else {
                points.forEach(function(kp) {
                    var name = kp.name || kp.knowledge_point || '-';
                    var mastery = parseFloat(kp.mastery || kp.score || 0);
                    var level = (kp.level || '').toLowerCase();
                    var m = masteryMap[level] || { label: level || '未知', cls: 'badge-info', color: 'var(--text3)' };

                    html += '<div style="margin-bottom:14px">';
                    html += '<div class="flex items-center justify-between mb-4" style="font-size:13px">';
                    html += '<b style="color:var(--text)">' + Common.escapeHtml(name) + '</b>';
                    html += '<span class="badge ' + m.cls + '">' + m.label + '</span>';
                    html += '</div>';
                    html += '<div style="background:var(--border-light);border-radius:6px;height:10px;overflow:hidden"><div style="width:' + mastery.toFixed(0) + '%;height:100%;background:' + m.color + ';border-radius:6px;transition:width .4s var(--ease-out)"></div></div>';
                    html += '<small style="font-size:11px;color:var(--text3)">掌握度: ' + mastery.toFixed(0) + '%</small>';
                    html += '</div>';
                });
            }
            html += '</div></div>';
        });
        document.getElementById('knowledge-content').innerHTML = html;
    }

    function loadReviewPlan() {
        showLoading('review-content');
        document.getElementById('review-result').innerHTML = '';

        API.review.plan(studentId).then(function(res) {
            if (!res || !res.success || !res.data) {
                showEmpty('review-content', '&#128214;', '暂无复习计划');
                return;
            }
            renderReviewPlan(res.data);
        }).catch(function() {
            showEmpty('review-content', '&#128214;', '加载失败');
        });
    }

    function renderReviewPlan(data) {
        var list = data.plans || data;
        if (!Array.isArray(list)) list = [];
        if (!list.length) {
            showEmpty('review-content', '&#128214;', '暂无复习计划');
            return;
        }

        var priorityMap = { 'high': { cls: 'badge-danger', label: '高优先' }, 'medium': { cls: 'badge-warning', label: '中优先' }, 'low': { cls: 'badge-info', label: '低优先' } };
        var errorTypeMap = { 'mistake': { cls: 'badge-warning', label: '粗心失误' }, 'not_understand': { cls: 'badge-danger', label: '理解不透' }, 'unknown': { cls: 'badge-info', label: '其他' } };

        var todayCount = 0;
        list.forEach(function(item) {
            var intervals = item.review_intervals || item.intervals || [];
            if (intervals.length > 0) todayCount++;
        });

        var html = '<div class="alert alert-info mb-16"><b>今日需复习: ' + todayCount + ' 个知识点</b></div>';

        list.forEach(function(item) {
            var name = item.knowledge_point || item.name || '-';
            var errorType = (item.error_type || '').toLowerCase();
            var et = errorTypeMap[errorType] || { cls: 'badge-info', label: errorType || '一般' };
            var priority = (item.priority || 'medium').toLowerCase();
            var pr = priorityMap[priority] || { cls: 'badge-info', label: priority };
            var intervals = item.review_intervals || item.intervals || [];
            var subject = item.subject || '';

            html += '<div class="suggest-card" style="margin-bottom:12px">';
            html += '<div style="flex:1">';
            html += '<div class="flex items-center justify-between mb-8">';
            html += '<b style="font-size:15px">' + Common.escapeHtml(name) + (subject ? '<span style="font-size:12px;color:var(--text3);margin-left:8px">[' + Common.escapeHtml(subject) + ']</span>' : '') + '</b>';
            html += '<div class="flex items-center gap-8">';
            html += '<span class="badge ' + et.cls + '">' + et.label + '</span>';
            html += '<span class="badge ' + pr.cls + '">' + pr.label + '</span>';
            html += '</div></div>';
            if (intervals.length > 0) {
                html += '<div style="font-size:12px;color:var(--text2)">复习间隔: ' + intervals.map(function(iv) { return Common.escapeHtml(String(iv)); }).join(' &rarr; ') + '</div>';
            }
            html += '</div>';
            html += '</div>';
        });

        document.getElementById('review-content').innerHTML = html;
    }

    function loadPortfolio() {
        showLoading('portfolio-content');
        document.getElementById('portfolio-result').innerHTML = '';

        API.portfolio.get(studentId).then(function(res) {
            if (!res || !res.success || !res.data) {
                showEmpty('portfolio-content', '&#128188;', '暂无成长档案数据');
                return;
            }
            renderPortfolio(res.data);
        }).catch(function() {
            showEmpty('portfolio-content', '&#128188;', '加载失败');
        });
    }

    function renderPortfolio(data) {
        var totalExams = data.total_exams || data.exam_count || 0;
        var bestScore = data.best_score || data.max_score || 0;
        var avgScore = data.avg_score || data.average || 0;
        var improvement = data.improvement_index || data.improvement || 0;
        var strongest = data.strongest_subject || data.best_subject || '-';
        var weakest = data.weakest_subject || data.worst_subject || '-';
        var totalErrors = data.total_errors || data.error_count || 0;

        var html = '<div class="stats-grid mb-16">';
        html += '<div class="stat-card"><div class="si">&#128221;</div><div class="stat-info"><h3>' + totalExams + '</h3><p>参加考试</p></div></div>';
        html += '<div class="stat-card"><div class="si">&#127942;</div><div class="stat-info"><h3>' + parseFloat(bestScore).toFixed(1) + '</h3><p>最佳成绩</p></div></div>';
        html += '<div class="stat-card"><div class="si">&#128202;</div><div class="stat-info"><h3>' + parseFloat(avgScore).toFixed(1) + '</h3><p>平均成绩</p></div></div>';
        html += '<div class="stat-card"><div class="si">&#128200;</div><div class="stat-info"><h3>' + (improvement >= 0 ? '+' : '') + parseFloat(improvement).toFixed(1) + '</h3><p>进步指数</p></div></div>';
        html += '<div class="stat-card"><div class="si">&#128170;</div><div class="stat-info"><h3>' + Common.escapeHtml(strongest) + '</h3><p>最强科目</p></div></div>';
        html += '<div class="stat-card"><div class="si">&#128531;</div><div class="stat-info"><h3>' + Common.escapeHtml(weakest) + '</h3><p>最弱科目</p></div></div>';
        html += '<div class="stat-card"><div class="si">&#9888;</div><div class="stat-info"><h3>' + totalErrors + '</h3><p>累计错题</p></div></div>';
        html += '</div>';

        var timeline = data.exam_timeline || data.history || [];
        if (Array.isArray(timeline) && timeline.length > 0) {
            html += '<div class="card"><div class="card-header"><div class="card-title">考试历程</div></div><div class="card-body"><div style="display:flex;flex-wrap:wrap;gap:12px">';
            timeline.forEach(function(e) {
                var score = parseFloat(e.total_score || e.score || 0);
                var name = e.exam_name || e.name || '-';
                html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;text-align:center;min-width:90px">';
                html += '<div style="font-size:12px;color:var(--text3)">' + Common.escapeHtml(name) + '</div>';
                html += '<div style="font-size:18px;font-weight:700;color:var(--primary)">' + score.toFixed(1) + '</div>';
                html += '<div style="font-size:11px;color:var(--text3)">' + Common.formatDate(e.exam_date || e.date) + '</div>';
                html += '</div>';
            });
            html += '</div></div></div>';
        }

        document.getElementById('portfolio-content').innerHTML = html;
    }

    function loadMoodCheckins() {
        document.getElementById('mood-result').innerHTML = '';
        showLoading('mood-checkins');
        initMoodButtons();
        API.checkin.get(studentId).then(function(res) {
            if (!res || !res.success || !res.data) {
                showEmpty('mood-checkins', '&#128578;', '暂无打卡记录');
                return;
            }
            renderMoodCheckins(res.data);
        }).catch(function() {
            showEmpty('mood-checkins', '&#128578;', '加载失败');
        });
    }

    var selectedMood = 0;
    function initMoodButtons() {
        selectedMood = 0;
        $$('.mood-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                selectedMood = parseInt(this.getAttribute('data-mood'));
                $$('.mood-btn').forEach(function(b) { b.style.border = '2px solid transparent'; });
                this.style.border = '2px solid var(--primary)';
                this.style.borderRadius = '8px';
                document.getElementById('mood-note-area').style.display = 'block';
            });
        });
    }

    window.submitMood = function() {
        if (!selectedMood) {
            document.getElementById('mood-result').innerHTML = '<div class="alert alert-error">请先选择心情</div>';
            return;
        }
        var note = document.getElementById('moodNote').value.trim();
        API.checkin.set({ student_id: studentId, mood: selectedMood, note: note || '' }).then(function(res) {
            if ((res && res.success) || (res && res.code === 0)) {
                selectedMood = 0;
                $$('.mood-btn').forEach(function(b) { b.style.border = '2px solid transparent'; });
                document.getElementById('mood-note-area').style.display = 'none';
                document.getElementById('moodNote').value = '';
                document.getElementById('mood-result').innerHTML = '<div class="alert alert-success">打卡成功！</div>';
                loadMoodCheckins();
            } else {
                document.getElementById('mood-result').innerHTML = '<div class="alert alert-error">' + Common.escapeHtml((res && res.message) || '打卡失败') + '</div>';
            }
        }).catch(function() {
            document.getElementById('mood-result').innerHTML = '<div class="alert alert-error">网络错误</div>';
        });
    };

    function renderMoodCheckins(data) {
        var list = data.checkins || data;
        if (!Array.isArray(list)) list = [];
        if (!list.length) {
            showEmpty('mood-checkins', '&#128578;', '暂无打卡记录');
            return;
        }

        var moodEmojis = { 1: '&#128577;', 2: '&#128542;', 3: '&#128528;', 4: '&#128522;', 5: '&#128525;' };
        var moodLabels = { 1: '很差', 2: '不太好', 3: '一般', 4: '不错', 5: '很好' };

        var html = '<div class="mt-16"><div class="table-wrap"><table><thead><tr><th>日期</th><th>心情</th><th>备注</th></tr></thead><tbody>';
        list.forEach(function(c) {
            var mood = parseInt(c.mood) || 3;
            html += '<tr>';
            html += '<td>' + Common.formatDate(c.created_at || c.date || c.time) + '</td>';
            html += '<td><span style="font-size:20px">' + (moodEmojis[mood] || '&#128528;') + '</span> <small>' + (moodLabels[mood] || '一般') + '</small></td>';
            html += '<td>' + Common.escapeHtml(c.note || '-') + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table></div></div>';
        document.getElementById('mood-checkins').innerHTML = html;
    }

    loadDashboard();
})();
</script>
