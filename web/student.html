<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduGrade - 学生中心</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .stack-gap{display:grid;gap:14px}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
    .summary-card{padding:16px;border-radius:14px;background:rgba(148,163,184,.08)}
    .summary-card .label{font-size:12px;color:var(--text2,#64748b);margin-bottom:6px}
    .summary-card .value{font-size:28px;font-weight:700}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .empty-state{padding:28px 16px;text-align:center;color:var(--text2,#64748b)}
    @media (max-width: 980px){.two-col{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>Edu<span>Grade</span></h2>
      <div class="ver">学生中心</div>
    </div>
    <nav class="sidebar-nav">
      <a class="active" data-section="dashboard-section"><span class="nv">&#128200;</span> 我的概览</a>
      <a data-section="grades-section"><span class="nv">&#128221;</span> 我的成绩</a>
      <a data-section="rankings-section"><span class="nv">&#127942;</span> 我的排名</a>
      <a data-section="info-section"><span class="nv">&#128100;</span> 个人信息</a>
      <a data-section="password-section"><span class="nv">&#128273;</span> 修改密码</a>
    </nav>
    <div class="sidebar-footer">
      <div class="av" id="studentAvatar">学</div>
      <div class="ui">
        <div class="un" id="studentName">学生</div>
        <div class="ur">学生</div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h2 id="studentPageTitle">我的概览</h2>
      <div class="topbar-actions">
        <button class="btn btn-icon" onclick="toggleTheme()" title="切换主题">&#9788;</button>
        <button class="btn btn-outline btn-sm" onclick="window.location.href='login.html'">返回登录页</button>
        <button class="btn btn-outline btn-sm" onclick="logout()">退出登录</button>
      </div>
    </div>

    <div class="content">
      <section class="page-section active" id="dashboard-section">
        <div class="card">
          <div class="card-header"><span class="card-title">欢迎回来</span></div>
          <div class="card-body">
            <div id="welcomeText" class="table-note">正在加载你的个人信息...</div>
          </div>
        </div>
        <div class="summary-grid" id="dashboardSummary" style="margin-top:18px">
          <div class="summary-card"><div class="label">最近考试总分</div><div class="value">-</div></div>
          <div class="summary-card"><div class="label">最近考试平均分</div><div class="value">-</div></div>
          <div class="summary-card"><div class="label">班级排名</div><div class="value">-</div></div>
          <div class="summary-card"><div class="label">年级排名</div><div class="value">-</div></div>
        </div>
      </section>

      <section class="page-section" id="grades-section">
        <div class="card">
          <div class="card-header"><span class="card-title">我的成绩</span></div>
          <div class="card-body">
            <div class="table-wrap">
              <table>
                <thead><tr><th>考试</th><th>日期</th><th>成绩明细</th><th>总分</th><th>平均分</th><th>班级排名</th><th>年级排名</th></tr></thead>
                <tbody id="studentGradesBody"><tr><td colspan="7" class="empty-state">暂无成绩数据</td></tr></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      <section class="page-section" id="rankings-section">
        <div class="card">
          <div class="card-header"><span class="card-title">我的排名</span></div>
          <div class="card-body">
            <div class="filter-row">
              <select id="studentRankExam"><option value="">请选择考试</option></select>
              <button class="btn btn-primary btn-sm" id="btnLoadStudentRank">查看排名</button>
            </div>
            <div class="summary-grid" id="studentRankCards" style="margin-top:16px">
              <div class="summary-card"><div class="label">总分</div><div class="value">-</div></div>
              <div class="summary-card"><div class="label">平均分</div><div class="value">-</div></div>
              <div class="summary-card"><div class="label">班级排名</div><div class="value">-</div></div>
              <div class="summary-card"><div class="label">年级排名</div><div class="value">-</div></div>
            </div>
            <div class="two-col" style="margin-top:18px">
              <div class="card">
                <div class="card-header"><span class="card-title">班级名次信息</span></div>
                <div class="card-body" id="classRankInfo"><div class="empty-state">请选择考试后查看</div></div>
              </div>
              <div class="card">
                <div class="card-header"><span class="card-title">年级名次信息</span></div>
                <div class="card-body" id="gradeRankInfo"><div class="empty-state">请选择考试后查看</div></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="page-section" id="info-section">
        <div class="card" style="max-width:720px;">
          <div class="card-header"><span class="card-title">个人信息</span></div>
          <div class="card-body">
            <form id="studentInfoForm" class="stack-gap">
              <div class="form-group"><label>学号</label><input type="text" name="id" id="studentInfoId" readonly></div>
              <div class="form-group"><label>姓名</label><input type="text" name="name" placeholder="请输入姓名"></div>
              <div class="form-group"><label>性别</label>
                <select name="gender">
                  <option value="男">男</option>
                  <option value="女">女</option>
                </select>
              </div>
              <div class="form-group"><label>生日</label><input type="date" name="birthday"></div>
              <div class="form-group"><label>班级</label><input type="text" name="class_name" id="studentInfoClass" readonly></div>
              <div class="form-group"><label>联系电话</label><input type="text" name="phone" placeholder="请输入联系电话"></div>
              <button type="submit" class="btn btn-primary">保存个人信息</button>
            </form>
          </div>
        </div>
      </section>

      <section class="page-section" id="password-section">
        <div class="card" style="max-width:520px;">
          <div class="card-header"><span class="card-title">修改密码</span></div>
          <div class="card-body">
            <form id="studentPasswordForm" class="stack-gap">
              <div class="form-group"><label>当前密码</label><input type="password" name="old_password" placeholder="请输入当前密码"></div>
              <div class="form-group"><label>新密码</label><input type="password" name="new_password" placeholder="至少 4 位"></div>
              <button type="submit" class="btn btn-primary">修改密码</button>
            </form>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/student.js"></script>
</body>
</html>
