<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩管理系统 - 学生中心</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <h2>成绩管理系统 - 学生中心</h2>
        <div class="header-right">
            <span id="userInfo"></span>
            <button onclick="changePassword()">修改密码</button>
            <button onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('grades')">我的成绩</div>
        <div class="tab" onclick="switchTab('rank')">排名查看</div>
    </div>

    <div class="content">
        <!-- ====== 个人信息 ====== -->
        <div class="info-box" id="personalInfo"></div>

        <!-- ====== 我的成绩 ====== -->
        <div id="tab-grades" class="tab-content active">
            <div class="toolbar">
                <div>
                    <select id="gradeExam" onchange="loadMyGrades()">
                        <option value="">全部考试</option>
                    </select>
                </div>
            </div>
            <div id="myGradesTable"></div>
            <div id="gradeSummary"></div>
        </div>

        <!-- ====== 排名查看 ====== -->
        <div id="tab-rank" class="tab-content">
            <div class="toolbar">
                <div>
                    <select id="rankExam" onchange="loadMyRank()">
                        <option value="">选择考试</option>
                    </select>
                    <select id="rankType" onchange="loadMyRank()">
                        <option value="total">总分排名</option>
                    </select>
                </div>
            </div>
            <h3 style="margin-bottom:12px;">我的排名</h3>
            <div class="stats-cards" id="myRankCards"></div>
            <h3 style="margin:20px 0 12px;">年级排名 TOP 10</h3>
            <div id="rankTopTable"></div>
        </div>
    </div>

    <script>
        var token = localStorage.getItem('token');
        var user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token) { window.location.href = 'login.html'; }

        function api(method, url, body) {
            var opt = {
                method: method,
                headers: { 'Authorization': 'Bearer ' + token }
            };
            if (body) {
                opt.headers['Content-Type'] = 'application/json';
                opt.body = JSON.stringify(body);
            }
            return fetch(url, opt).then(function(r) { return r.json(); });
        }

        function init() {
            api('GET', '/api/auth/check').then(function(d) {
                if (!d.success) { logout(); return; }
                document.getElementById('userInfo').textContent = d.data.name + ' (' + d.data.role + ')';
                // 加载个人信息
                api('GET', '/api/students?search=' + d.data.id).then(function(r) {
                    if (r.success && r.data[0]) {
                        var s = r.data[0];
                        document.getElementById('personalInfo').innerHTML =
                            '<div class="info-item"><strong>学号：</strong>' + s.id + '</div>' +
                            '<div class="info-item"><strong>姓名：</strong>' + s.name + '</div>' +
                            '<div class="info-item"><strong>性别：</strong>' + (s.gender || '') + '</div>' +
                            '<div class="info-item"><strong>班级：</strong>' + (s.class || '') + '</div>';
                    }
                });
            });
            loadExamSelects();
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function changePassword() {
            var oldPwd = prompt('请输入旧密码：');
            if (!oldPwd) return;
            var newPwd = prompt('请输入新密码（至少4位）：');
            if (!newPwd || newPwd.length < 4) { alert('密码至少4位'); return; }
            api('POST', '/api/change-password', { old_password: oldPwd, new_password: newPwd }).then(function(d) {
                alert(d.message);
            });
        }

        function switchTab(name) {
            document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
            document.querySelectorAll('.tab').forEach(function(el) { el.classList.remove('active'); });
            document.getElementById('tab-' + name).classList.add('active');
            event.target.classList.add('active');
            if (name === 'grades') loadMyGrades();
            if (name === 'rank') loadMyRank();
        }

        function buildTable(headers, rows) {
            var html = '<table><thead><tr>';
            headers.forEach(function(h) { html += '<th>' + h + '</th>'; });
            html += '</tr></thead><tbody>';
            if (rows.length === 0) {
                html += '<tr><td colspan="' + headers.length + '" style="text-align:center;color:#999;">暂无数据</td></tr>';
            } else {
                rows.forEach(function(row) {
                    html += '<tr>';
                    headers.forEach(function(h) { html += '<td>' + (row[h] !== undefined ? row[h] : '') + '</td>'; });
                    html += '</tr>';
                });
            }
            html += '</tbody></table>';
            return html;
        }

        function loadExamSelects() {
            api('GET', '/api/exams').then(function(d) {
                if (!d.success) return;
                var opts = '<option value="">选择考试</option>';
                d.data.forEach(function(e) {
                    opts += '<option value="' + e.id + '">' + e.name + '</option>';
                });
                document.getElementById('gradeExam').innerHTML = '<option value="">全部考试</option>' + opts;
                document.getElementById('rankExam').innerHTML = opts;
                loadMyGrades();
            });
        }

        // ====== 我的成绩 ======
        function loadMyGrades() {
            api('GET', '/api/grades/student/' + user.id).then(function(d) {
                if (!d.success) return;
                var examId = document.getElementById('gradeExam').value;
                var grades = d.data;
                if (examId) {
                    grades = grades.filter(function(g) { return g.exam_id === examId; });
                }

                // 构建表格数据
                var rows = [];
                var allSubjects = {};
                grades.forEach(function(g) {
                    for (var k in g.scores) { allSubjects[k] = true; }
                });
                var subjectList = Object.keys(allSubjects).sort();

                grades.forEach(function(g) {
                    var row = { 考试: g.exam_id };
                    subjectList.forEach(function(s) { row[s] = g.scores[s] || '-'; });
                    // 计算总分
                    var total = 0, count = 0;
                    subjectList.forEach(function(s) {
                        if (g.scores[s]) { total += parseFloat(g.scores[s]); count++; }
                    });
                    row['总分'] = total;
                    row['平均分'] = count > 0 ? (total / count).toFixed(1) : '-';
                    rows.push(row);
                });

                var headers = ['考试'].concat(subjectList).concat(['总分','平均分']);
                document.getElementById('myGradesTable').innerHTML = buildTable(headers, rows);

                // 摘要
                if (grades.length > 0) {
                    var bestTotal = 0, bestExam = '';
                    rows.forEach(function(r) {
                        if (parseFloat(r['总分']) > bestTotal) {
                            bestTotal = parseFloat(r['总分']);
                            bestExam = r['考试'];
                        }
                    });
                    document.getElementById('gradeSummary').innerHTML =
                        '<div class="stats-cards" style="margin-top:16px;">' +
                        '<div class="stat-card"><div class="value">' + grades.length + '</div><div class="label">参加考试次数</div></div>' +
                        '<div class="stat-card"><div class="value">' + bestTotal + '</div><div class="label">历史最高总分（' + bestExam + '）</div></div>' +
                        '</div>';
                }
            });
        }

        // ====== 排名查看 ======
        function loadMyRank() {
            var examId = document.getElementById('rankExam').value;
            if (!examId) return;

            var rankType = document.getElementById('rankType').value;

            // 获取总分排名
            api('GET', '/api/stats/rank?exam_id=' + examId + '&type=' + rankType).then(function(d) {
                if (!d.success || !d.data) return;

                // 找我的排名
                var myRank = d.data.find(function(r) { return r.student_id === user.id; });

                if (myRank) {
                    document.getElementById('myRankCards').innerHTML =
                        '<div class="stat-card"><div class="value">第 ' + myRank.rank + ' 名</div><div class="label">年级排名</div></div>' +
                        '<div class="stat-card"><div class="value">' + myRank.total_score + '</div><div class="label">总分</div></div>' +
                        '<div class="stat-card"><div class="value">' + myRank.avg_score + '</div><div class="label">平均分</div></div>' +
                        '<div class="stat-card"><div class="value">共 ' + d.data.length + ' 人</div><div class="label">年级总人数</div></div>';
                } else {
                    document.getElementById('myRankCards').innerHTML = '<p style="color:#999;">暂无该次考试的排名数据</p>';
                }

                // TOP 10
                var top10 = d.data.slice(0, 10).map(function(r) {
                    return {
                        排名: r.rank,
                        学号: r.student_id,
                        姓名: r.name || '',
                        班级: r.class || '',
                        总分: r.total_score,
                        平均分: r.avg_score,
                        备注: r.student_id === user.id ? '← 我' : ''
                    };
                });
                document.getElementById('rankTopTable').innerHTML = buildTable(
                    ['排名','学号','姓名','班级','总分','平均分','备注'], top10
                );
            });
        }

        init();
    </script>
</body>
</html>
