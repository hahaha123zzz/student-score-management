<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩管理系统 - 学生中心</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <h2>成绩管理系统 - 学生中心</h2>
        <div class="header-right">
            <span id="userInfo"></span>
            <button onclick="changePassword()">修改密码</button>
            <button onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('grades')">我的成绩</div>
        <div class="tab" onclick="switchTab('rank')">排名查看</div>
    </div>

    <div class="content">
        <!-- ====== 个人信息 ====== -->
        <div class="info-box" id="personalInfo"></div>

        <!-- ====== 我的成绩 ====== -->
        <div id="tab-grades" class="tab-content active">
            <div class="toolbar">
                <div>
                    <select id="gradeExam" onchange="loadMyGrades()">
                        <option value="">全部考试</option>
                    </select>
                </div>
            </div>
            <div id="myGradesTable"></div>
            <div id="gradeSummary"></div>
        </div>

        <!-- ====== 排名查看 ====== -->
        <div id="tab-rank" class="tab-content">
            <div class="toolbar">
                <div>
                    <select id="rankExam" onchange="loadMyRank()">
                        <option value="">选择考试</option>
                    </select>
                    <select id="rankSubject" onchange="loadMyRank()">
                        <option value="">总分排名</option>
                    </select>
                </div>
            </div>
            <div id="myRankTable"></div>
        </div>
    </div>

    <script>
        var token = localStorage.getItem('token');
        var user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token) { window.location.href = 'login.html'; }

        function api(method, url, body) {
            var opt = {
                method: method,
                headers: { 'Authorization': 'Bearer ' + token }
            };
            if (body) {
                opt.headers['Content-Type'] = 'application/json';
                opt.body = JSON.stringify(body);
            }
            return fetch(url, opt).then(function(r) { return r.json(); });
        }

        function init() {
            api('GET', '/api/auth/check').then(function(d) {
                if (!d.success) { logout(); return; }
                document.getElementById('userInfo').textContent = d.data.name + ' (学生)';
                myStudentId = d.data.user_id;
                document.getElementById('personalInfo').innerHTML = '<span>学号：' + myStudentId + '</span> | <span>姓名：' + d.data.name + '</span>';
                loadMyGrades();
                loadExamSelects();
            });
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function changePassword() {
            var oldPwd = prompt('请输入旧密码：');
            if (!oldPwd) return;
            var newPwd = prompt('请输入新密码（至少4位）：');
            if (!newPwd || newPwd.length < 4) { alert('密码至少4位'); return; }
            api('POST', '/api/change-password', { old_password: oldPwd, new_password: newPwd }).then(function(d) {
                alert(d.message);
            });
        }

        function switchTab(name) {
            document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
            document.querySelectorAll('.tab').forEach(function(el) { el.classList.remove('active'); });
            document.getElementById('tab-' + name).classList.add('active');
            event.target.classList.add('active');
            if (name === 'grades') loadMyGrades();
            if (name === 'rank') loadMyRank();
        }

        function buildTable(headers, rows, _unused) {
            var html = '<table><thead><tr>';
            headers.forEach(function(h) { html += '<th>' + h + '</th>'; });
            html += '</tr></thead><tbody>';
            if (rows.length === 0) {
                html += '<tr><td colspan="' + headers.length + '" style="text-align:center;color:#999;">暂无数据</td></tr>';
            } else {
                rows.forEach(function(row) {
                    html += '<tr>';
                    headers.forEach(function(h) { html += '<td>' + (row[h] !== undefined ? row[h] : '') + '</td>'; });
                    html += '</tr>';
                });
            }
            html += '</tbody></table>';
            return html;
        }

        function loadExamSelects() {
            api('GET', '/api/exams').then(function(d) {
                if (!d.success) return;
                var opts = '<option value="">全部考试</option>';
                d.data.forEach(function(e) { opts += '<option value="' + e.id + '">' + e.name + '</option>'; });
                document.getElementById('gradeExam').innerHTML = opts;
                document.getElementById('rankExam').innerHTML = '<option value="">选择考试</option>' + opts.replace('全部考试','');
            });
            api('GET', '/api/subjects').then(function(d) {
                if (!d.success) return;
                var rankSub = document.getElementById('rankSubject');
                var opts = '<option value="">总分排名</option>';
                d.data.forEach(function(s) { opts += '<option value="' + s.name + '">' + s.name + '排名</option>'; });
                if (rankSub) rankSub.innerHTML = opts;
            });
        }

        // ====== 我的成绩 ======
        var myStudentId = '';
        function loadMyGrades() {
            if (!myStudentId) {
                api('GET', '/api/auth/check').then(function(ad) {
                    if (!ad.success) return;
                    myStudentId = ad.data.user_id;
                    loadMyGradesData();
                });
            } else {
                loadMyGradesData();
            }
        }

        function loadMyGradesData() {
            var examId = document.getElementById('gradeExam').value;
            var url = '/api/grades?student_id=' + myStudentId;
            if (examId) url += '&exam_id=' + examId;
            api('GET', url).then(function(d) {
                if (!d.success || !d.data || d.data.length === 0) {
                    document.getElementById('myGradesTable').innerHTML = '<p style="color:#999;text-align:center;padding:40px;">暂无成绩数据，请确认已参加考试</p>';
                    return;
                }
                var subjects = [];
                var rows = [];
                d.data.forEach(function(g) {
                    var row = { 考试: g.exam_id, 姓名: g.student_name, 班级: g.class };
                    if (g.scores && typeof g.scores === 'object') {
                        var sum = 0, cnt = 0;
                        for (var k in g.scores) {
                            if (subjects.indexOf(k) === -1) subjects.push(k);
                            var v = parseFloat(g.scores[k]) || 0;
                            row[k] = v;
                            sum += v;
                            cnt++;
                        }
                        row['总分'] = sum;
                    }
                    if (g.is_makeup) row['备注'] = '补考';
                    rows.push(row);
                });
                var headers = ['考试','姓名','班级'].concat(subjects).concat(['总分']);
                document.getElementById('myGradesTable').innerHTML = buildTable(headers, rows, []);
            });
        }

        // ====== 排名查看 ======
        function loadMyRank() {
            var examId = document.getElementById('rankExam').value;
            if (!examId || !myStudentId) {
                document.getElementById('myRankTable').innerHTML = '<p style="color:#999;text-align:center;padding:40px;">请选择考试</p>';
                return;
            }
            var subject = document.getElementById('rankSubject') ? document.getElementById('rankSubject').value : '';
            var url = '/api/stats/rank?exam_id=' + examId + '&type=global';
            if (subject) url += '&subject=' + encodeURIComponent(subject);
            api('GET', url).then(function(d) {
                if (!d.success || !d.data || d.data.length === 0) {
                    document.getElementById('myRankTable').innerHTML = '<p style="color:#999;text-align:center;padding:40px;">暂无排名数据</p>';
                    return;
                }
                var selfRank = null;
                var top10 = [];
                d.data.forEach(function(r, i) {
                    if (r.student_id === myStudentId) selfRank = r;
                    if (i < 10) top10.push(r);
                });
                var rows = top10.map(function(r) {
                    return { 排名: r.rank, 学号: r.student_id, 姓名: r.student_name, 班级: r.class, 总分: r.total_score };
                });
                var headers = ['排名','学号','姓名','班级','总分'];
                var html = '<h3>年级前十名</h3>';
                html += buildTable(headers, rows, []);
                if (selfRank) {
                    html += '<h3 style="margin-top:20px;">我的排名</h3>';
                    html += buildTable(headers, [{ 排名: selfRank.rank, 学号: selfRank.student_id, 姓名: selfRank.student_name, 班级: selfRank.class, 总分: selfRank.total_score }], []);
                }
                document.getElementById('myRankTable').innerHTML = html;
            });
        }

        init();
    </script>
</body>
</html>
